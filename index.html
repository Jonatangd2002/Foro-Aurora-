<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Foro Aurora: un foro web ligero con temas, respuestas y modo claro/oscuro.">
  <meta name="theme-color" content="#ffffff">
  <title>Foro Aurora</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #f6f8fb;
      --panel: #ffffff;
      --panel-strong: #eef3f7;
      --text: #17202a;
      --muted: #5d6978;
      --line: #dfe6ee;
      --accent: #0f8b8d;
      --accent-strong: #0b6b6d;
      --accent-soft: #d9f2f0;
      --warm: #f5a623;
      --danger: #c64756;
      --shadow: 0 18px 38px rgba(22, 35, 53, 0.09);
    }

    body.dark {
      color-scheme: dark;
      --bg: #0e1117;
      --surface: #151a22;
      --panel: #1d2430;
      --panel-strong: #252e3c;
      --text: #f4f7fb;
      --muted: #a9b5c4;
      --line: #313b4b;
      --accent: #54d2c8;
      --accent-strong: #7ee5dc;
      --accent-soft: #143d3f;
      --warm: #ffd166;
      --danger: #ff7a8a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 180ms ease, color 180ms ease;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(15, 139, 141, 0.12), transparent 34rem),
        linear-gradient(180deg, var(--surface), var(--bg) 22rem);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: center;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 0.9rem 0;
    }

    .topbar-actions {
      display: flex;
      gap: 0.55rem;
      align-items: center;
    }

    .brand {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--warm));
      box-shadow: var(--shadow);
      color: #fff;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.1;
    }

    .brand p {
      margin: 0.2rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .theme-toggle {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      transition: transform 160ms ease, background 160ms ease, border 160ms ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .theme-toggle svg {
      width: 22px;
      height: 22px;
      display: none;
    }

    body:not(.dark) .sun-icon,
    body.dark .moon-icon {
      display: block;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 300px;
      gap: 1rem;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 1rem 0 2.5rem;
    }

    .sidebar,
    .composer,
    .post,
    .trends {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sidebar,
    .trends {
      position: sticky;
      top: 78px;
      align-self: start;
      padding: 1rem;
    }

    .nav-title,
    .section-title {
      margin: 0 0 0.8rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .category-list {
      display: grid;
      gap: 0.45rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .category-button {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      gap: 0.65rem;
      align-items: center;
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 0.45rem 0.5rem;
    }

    .category-button:hover,
    .category-button.active {
      background: var(--accent-soft);
    }

    .category-icon {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--accent-strong);
    }

    .category-button span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 0.94rem;
    }

    .badge {
      min-width: 28px;
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-align: center;
      padding: 0.18rem 0.44rem;
    }

    .forum-main {
      min-width: 0;
      display: grid;
      gap: 1rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 0.75rem;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 0.9rem;
      width: 19px;
      height: 19px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input,
    .toolbar select,
    .composer input,
    .composer textarea,
    .reply-form input,
    .reply-form textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      outline: 0;
      transition: border 160ms ease, box-shadow 160ms ease;
    }

    .search input {
      height: 46px;
      padding: 0 1rem 0 2.75rem;
    }

    .toolbar select {
      height: 46px;
      padding: 0 0.8rem;
    }

    .search input:focus,
    .toolbar select:focus,
    .composer input:focus,
    .composer textarea:focus,
    .reply-form input:focus,
    .reply-form textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .composer {
      padding: 1rem;
    }

    .composer-header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.85rem;
    }

    .composer-header h2 {
      margin: 0;
      font-size: 1rem;
    }

    .composer-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.85fr) 150px;
      gap: 0.75rem;
    }

    .composer input,
    .reply-form input {
      height: 44px;
      padding: 0 0.85rem;
    }

    .composer textarea,
    .reply-form textarea {
      min-height: 92px;
      resize: vertical;
      margin-top: 0.75rem;
      padding: 0.8rem 0.85rem;
      line-height: 1.45;
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-top: 0.8rem;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .primary-button {
      display: inline-flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      padding: 0.68rem 1rem;
    }

    .primary-button:hover {
      background: var(--accent-strong);
    }

    .primary-button svg {
      width: 18px;
      height: 18px;
    }

    .feed {
      display: grid;
      gap: 0.85rem;
    }

    .post {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 0.85rem;
      padding: 1rem;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 75%, #ffffff), color-mix(in srgb, var(--warm) 80%, #ffffff));
      color: #ffffff;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: inset 0 -12px 26px rgba(0, 0, 0, 0.16);
    }

    .post-body {
      min-width: 0;
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.65rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .post-meta strong {
      color: var(--text);
    }

    .tag {
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 800;
      padding: 0.16rem 0.48rem;
    }

    .post h3 {
      margin: 0.45rem 0 0.35rem;
      font-size: 1.08rem;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .post p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.85rem;
    }

    .icon-button {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 800;
      padding: 0.38rem 0.65rem;
    }

    .icon-button:hover,
    .icon-button.active {
      border-color: var(--accent);
      color: var(--accent-strong);
      background: var(--accent-soft);
    }

    .icon-button svg {
      width: 16px;
      height: 16px;
    }

    .replies {
      display: grid;
      gap: 0.65rem;
      margin-top: 0.9rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--line);
    }

    .reply {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 0.6rem;
      align-items: start;
    }

    .reply-avatar {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .reply-content {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 0.65rem 0.75rem;
    }

    .reply-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.6rem;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.25rem;
    }

    .reply-meta strong {
      color: var(--text);
    }

    .reply-form {
      display: grid;
      gap: 0.65rem;
      margin-top: 0.9rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--line);
    }

    .reply-form textarea {
      min-height: 72px;
      margin-top: 0;
    }

    .reply-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.55rem;
    }

    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 800;
      padding: 0.55rem 0.85rem;
    }

    .secondary-button:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
      background: var(--accent-soft);
    }

    .trends-list {
      display: grid;
      gap: 0.75rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .trend-item {
      display: grid;
      gap: 0.25rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.75rem;
    }

    .trend-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .trend-item strong {
      font-size: 0.92rem;
    }

    .trend-item span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .side-tools {
      display: grid;
      gap: 0.7rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line);
    }

    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    .tool-grid .secondary-button,
    .tool-grid .danger-button {
      width: 100%;
      min-height: 40px;
      padding: 0.5rem 0.65rem;
      font-size: 0.84rem;
    }

    .danger-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid color-mix(in srgb, var(--danger) 35%, var(--line));
      border-radius: 8px;
      background: var(--panel);
      color: var(--danger);
      font-weight: 800;
      padding: 0.55rem 0.85rem;
    }

    .danger-button:hover {
      background: color-mix(in srgb, var(--danger) 12%, var(--panel));
    }

    .status-message {
      min-height: 20px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .connection-form {
      display: grid;
      gap: 0.55rem;
      margin-top: 0.2rem;
    }

    .connection-form input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      outline: 0;
      padding: 0 0.65rem;
      font-size: 0.84rem;
    }

    .connection-form input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .field-label {
      display: grid;
      gap: 0.25rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .file-input {
      display: none;
    }

    .empty-state {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 2rem 1rem;
    }

    .empty-state.visible {
      display: block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 220px minmax(0, 1fr);
      }

      .trends {
        position: static;
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .topbar-inner,
      .layout {
        width: min(100% - 24px, 1180px);
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        overflow-x: auto;
        padding: 0.75rem;
      }

      .category-list {
        grid-auto-flow: column;
        grid-auto-columns: max-content;
        overflow-x: auto;
      }

      .category-button {
        width: max-content;
        min-width: 148px;
      }

      .toolbar,
      .composer-grid {
        grid-template-columns: 1fr;
      }

      .composer-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .primary-button {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .brand p {
        display: none;
      }

      .post {
        grid-template-columns: 40px minmax(0, 1fr);
        padding: 0.85rem;
      }

      .avatar {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" aria-label="Foro Aurora">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              <path d="M8 9h8M8 13h5"/>
            </svg>
          </div>
          <div>
            <h1>Foro Aurora</h1>
            <p>Debates, preguntas y respuestas de la comunidad</p>
          </div>
        </div>

        <div class="topbar-actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Cambiar a modo oscuro" title="Cambiar tema">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.8A8.8 8.8 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Categorías del foro">
        <p class="nav-title">Categorías</p>
        <ul class="category-list" id="categoryList">
          <li>
            <button class="category-button active" type="button" data-category="Todo">
              <span class="category-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
              </span>
              <span>Todo</span>
              <span class="badge" data-count="Todo">0</span>
            </button>
          </li>
          <li>
            <button class="category-button" type="button" data-category="General">
              <span class="category-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7 8h10M7 12h6"></path>
                  <path d="M21 12a8 8 0 0 1-8 8H7l-4 3v-5a8 8 0 1 1 18-6Z"></path>
                </svg>
              </span>
              <span>General</span>
              <span class="badge" data-count="General">0</span>
            </button>
          </li>
          <li>
            <button class="category-button" type="button" data-category="Ayuda">
              <span class="category-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2-3 4"></path>
                  <path d="M12 17h.01"></path>
                </svg>
              </span>
              <span>Ayuda</span>
              <span class="badge" data-count="Ayuda">0</span>
            </button>
          </li>
          <li>
            <button class="category-button" type="button" data-category="Ideas">
              <span class="category-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 18h6"></path>
                  <path d="M10 22h4"></path>
                  <path d="M12 2a7 7 0 0 0-4 12.74V17h8v-2.26A7 7 0 0 0 12 2Z"></path>
                </svg>
              </span>
              <span>Ideas</span>
              <span class="badge" data-count="Ideas">0</span>
            </button>
          </li>
          <li>
            <button class="category-button" type="button" data-category="Anuncios">
              <span class="category-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m3 11 18-5v12L3 13v-2Z"></path>
                  <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path>
                </svg>
              </span>
              <span>Anuncios</span>
              <span class="badge" data-count="Anuncios">0</span>
            </button>
          </li>
        </ul>
      </aside>

      <section class="forum-main" aria-label="Publicaciones del foro">
        <div class="toolbar">
          <label class="search">
            <span class="sr-only">Buscar en el foro</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

function readJson(key, fallback) {
  try {
    const value = JSON.parse(localStorage.getItem(key) || "null");
    return value === null ? fallback : value;
  } catch (error) {
    return fallback;
  }
}

function writeJson(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function likedPostIds() {
  const values = readJson(likedPostStorageKey, []);
  return new Set(Array.isArray(values) ? values : []);
}

function saveLikedPostIds(values) {
  writeJson(likedPostStorageKey, [...values]);
}

function formatTime(date = new Date()) {
  try {
    return new Intl.DateTimeFormat("es-CL", {
      dateStyle: "short",
      timeStyle: "short"
    }).format(date);
  } catch (error) {
    return "ahora";
  }
}

function formatDbTime(value) {
  if (!value) return "ahora";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return formatTime(date);
}

function initialsFor(name) {
  const letters = String(name || "")
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map((word) => word[0])
    .join("")
    .toUpperCase();

  return letters || "US";
}

function cleanUsername(value) {
  return String(value || "")
    .trim()
    .replace(/\s+/g, " ")
    .slice(0, 34);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function cssEscape(value) {
  if (window.CSS && typeof window.CSS.escape === "function") {
    return window.CSS.escape(String(value));
  }
  return String(value).replace(/["\\]/g, "\\$&");
}

function safeAvatarColor(value) {
  const color = String(value || "").trim();
  if (/^#[0-9a-f]{6}$/i.test(color)) return color;
  return avatarColorFor(color || "usuario");
}

function avatarColorFor(seed) {
  const text = String(seed || "usuario");
  let hash = 0;
  for (let index = 0; index < text.length; index += 1) {
    hash = ((hash << 5) - hash) + text.charCodeAt(index);
    hash |= 0;
  }
  return avatarPalette[Math.abs(hash) % avatarPalette.length];
}

function avatarStyle(color) {
  const safeColor = safeAvatarColor(color);
  return `style="background: ${safeColor};"`;
}

function fallbackUsername(user = currentUser) {
  const metadataName = cleanUsername(user?.user_metadata?.username || user?.user_metadata?.display_name);
  if (metadataName) return metadataName;
  return cleanUsername(String(user?.email || "").split("@")[0]) || "Usuario";
}

function currentAuthorInfo() {
  const username = cleanUsername(currentProfile?.username) || fallbackUsername();
  const color = safeAvatarColor(currentProfile?.avatarColor || currentProfile?.avatar_color || avatarColorFor(currentUser?.id || username));
  return {
    userId: currentUser?.id || null,
    authorEmail: currentUser?.email || "",
    author: username,
    initials: initialsFor(username),
    avatarColor: color
  };
}

function normalizePost(post) {
  const author = post.author || "Anónimo";
  const likes = Number(post.likes);

  return {
    id: post.id || createId(),
    title: post.title || "Tema sin título",
    message: post.message || "",
    category: post.category || "General",
    author,
    initials: post.initials || initialsFor(author),
    avatarColor: safeAvatarColor(post.avatarColor || post.avatar_color || author),
    userId: post.userId || post.user_id || null,
    authorEmail: post.authorEmail || post.author_email || "",
    replies: Array.isArray(post.replies) ? post.replies.map((reply) => normalizeReply(reply, post.id || "")) : [],
    likes: Number.isFinite(likes) ? Math.max(0, likes) : 0,
    time: post.time || formatDbTime(post.created_at),
    createdAt: post.createdAt || post.created_at || null,
    deletedAt: post.deletedAt || post.deleted_at || null,
    liked: Boolean(post.liked)
  };
}

function normalizeReply(reply, postId = "", parentReplyId = null) {
  const id = reply.id || createId();
  const author = reply.author || "Anónimo";

  return {
    id,
    postId: reply.postId || reply.post_id || postId,
    parentReplyId: reply.parentReplyId ?? reply.parent_reply_id ?? parentReplyId,
    author,
    initials: reply.initials || initialsFor(author),
    avatarColor: safeAvatarColor(reply.avatarColor || reply.avatar_color || author),
    userId: reply.userId || reply.user_id || null,
    authorEmail: reply.authorEmail || reply.author_email || "",
    message: reply.message || "",
    time: reply.time || formatDbTime(reply.created_at),
    createdAt: reply.createdAt || reply.created_at || null,
    deletedAt: reply.deletedAt || reply.deleted_at || null,
    replies: Array.isArray(reply.replies) ? reply.replies.map((child) => normalizeReply(child, postId, id)) : []
  };
}

function loadLocalPosts() {
  const savedPosts = readJson(localPostStorageKey, []);
  return Array.isArray(savedPosts) ? savedPosts.map(normalizePost) : [];
}

function saveLocalPosts() {
  writeJson(localPostStorageKey, posts);
}

function normalizeSupabaseUrl(value) {
  return String(value || "")
    .trim()
    .replace(/\/rest\/v1\/?$/i, "")
    .replace(/\/+$/g, "");
}

function getSupabaseConfig() {
  const saved = readJson(supabaseConfigKey, {});
  const savedKey = String(saved.key || "").trim();
  const builtInKey = String(defaultSupabaseConfig.key || "").trim();

  return {
    url: normalizeSupabaseUrl(saved.url || defaultSupabaseConfig.url),
    key: savedKey || builtInKey
  };
}

function saveSupabaseConfig() {
  const config = {
    url: normalizeSupabaseUrl(supabaseUrlInput.value || defaultSupabaseConfig.url),
    key: supabaseKeyInput.value.trim()
  };

  if (!config.url || !config.key) {
    showStatus("Falta guardar la clave pública de Supabase una vez.");
    return null;
  }

  supabaseUrlInput.value = config.url;
  writeJson(supabaseConfigKey, config);
  return config;
}

function fillSupabaseInputs() {
  const config = getSupabaseConfig();
  supabaseUrlInput.value = config.url;
  supabaseKeyInput.value = config.key;
  connectButton.textContent = config.key ? "Reconectar" : "Guardar clave";
}

function setConnectionStatus(message) {
  connectionStatus.textContent = message;
}

function showStatus(message) {
  window.clearTimeout(statusTimer);
  statusMessage.textContent = message;
  if (authHint) authHint.textContent = message;
  statusTimer = window.setTimeout(() => {
    statusMessage.textContent = "";
    if (authHint) authHint.textContent = "";
  }, 5000);
}

function withTimeout(promise, ms, message) {
  let timer = null;
  const timeout = new Promise((_, reject) => {
    timer = window.setTimeout(() => {
      reject(new Error(message || "La conexión tardó demasiado."));
    }, ms);
  });

  return Promise.race([promise, timeout]).finally(() => {
    if (timer) window.clearTimeout(timer);
  });
}

function authErrorMessage(error) {
  const message = String(error?.message || "").toLowerCase();

  if (message.includes("email not confirmed") || message.includes("confirm")) {
    return "Tu correo aún no está confirmado. Revisa tu email o desactiva Confirm email en Supabase para probar.";
  }

  if (message.includes("invalid login") || message.includes("invalid credentials")) {
    return "Correo o contraseña incorrectos.";
  }

  if (message.includes("fetch") || message.includes("network") || message.includes("timeout")) {
    return "No se pudo conectar con Supabase. Revisa internet, URL y clave pública.";
  }

  return "No se pudo entrar. Revisa correo, contraseña y confirmación de email.";
}

function setTheme(isDark) {
  document.body.classList.toggle("dark", isDark);
  localStorage.setItem("forum-theme", isDark ? "dark" : "light");
  themeToggle.setAttribute("aria-label", isDark ? "Cambiar a modo claro" : "Cambiar a modo oscuro");
  if (themeColor) themeColor.setAttribute("content", isDark ? "#0e1117" : "#ffffff");
}

function flattenReplies(replies) {
  return replies.flatMap((reply) => [reply, ...flattenReplies(reply.replies || [])]);
}

function countReplies(replies) {
  return replies.reduce((sum, reply) => sum + 1 + countReplies(reply.replies || []), 0);
}

function visiblePosts() {
  const query = searchInput.value.trim().toLowerCase();
  const sorted = [...posts].sort((a, b) => {
    if (sortSelect.value === "popular") return b.likes - a.likes;
    if (sortSelect.value === "replies") return countReplies(b.replies) - countReplies(a.replies);
    return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
  });

  return sorted.filter((post) => {
    const matchesCategory = activeCategory === "Todo" || post.category === activeCategory;
    const replyText = flattenReplies(post.replies)
      .map((reply) => `${reply.author} ${reply.message}`)
      .join(" ");
    const searchable = `${post.title} ${post.message} ${post.author} ${post.category} ${replyText}`.toLowerCase();
    return matchesCategory && searchable.includes(query);
  });
}

function updateCounts() {
  const counts = posts.reduce((acc, post) => {
    acc[post.category] = (acc[post.category] || 0) + 1;
    acc.Todo += 1;
    return acc;
  }, { Todo: 0, General: 0, Ayuda: 0, Ideas: 0, Anuncios: 0 });

  document.querySelectorAll("[data-count]").forEach((item) => {
    item.textContent = counts[item.dataset.count] ?? 0;
  });

  const totalReplies = posts.reduce((sum, post) => sum + countReplies(post.replies), 0);
  const topCategory = Object.entries(counts)
    .filter(([category]) => category !== "Todo")
    .sort((a, b) => b[1] - a[1])
    .find(([, count]) => count > 0);

  activityPosts.textContent = `${posts.length} ${posts.length === 1 ? "tema" : "temas"}`;
  activityReplies.textContent = `${totalReplies} ${totalReplies === 1 ? "respuesta" : "respuestas"}`;
  activityCategory.textContent = topCategory ? `#${topCategory[0].toLowerCase()}` : "Sin categorías";
  activityCategoryInfo.textContent = topCategory
    ? `${topCategory[1]} ${topCategory[1] === 1 ? "tema publicado" : "temas publicados"}`
    : "Aún no hay temas";
}

function updateEmptyState(items) {
  if (posts.length === 0) {
    emptyState.textContent = usingRemote
      ? "La base compartida está vacía. Crea el primer tema."
      : "Conecta Supabase para usar cuentas y publicar.";
  } else {
    emptyState.textContent = "No hay temas que coincidan con tu búsqueda.";
  }

  emptyState.classList.toggle("visible", items.length === 0);
}

function isOwnItem(item) {
  return Boolean(currentUser && item.userId && item.userId === currentUser.id);
}

function targetKey(postId, parentReplyId = null) {
  return parentReplyId ? `reply:${parentReplyId}` : `post:${postId}`;
}

function renderReplyForm(postId, parentReplyId = null) {
  const key = targetKey(postId, parentReplyId);
  if (activeReplyTarget !== key) return "";

  if (!currentUser) {
    return `
      <div class="reply-form">
        <div class="composer-notice visible">

        </div>
      </div>
    `;
  }

  return `
    <form class="reply-form" data-reply-form data-post-id="${escapeHtml(postId)}" data-parent-reply-id="${escapeHtml(parentReplyId || "")}">
      <label>
        <span class="sr-only">Respuesta</span>
        <textarea name="replyMessage" maxlength="300" placeholder="Escribe tu respuesta..." data-reply-text="${escapeHtml(key)}" required></textarea>
      </label>
      <div class="reply-form-actions">
        <button class="secondary-button" type="button" data-cancel-reply>Cancelar</button>
        <button class="primary-button" type="submit">Enviar respuesta</button>
      </div>
    </form>
  `;
}

function renderReplies(replies, depth = 0) {

  return `
    <div class="replies" aria-label="Respuestas">
      ${replies.map((reply) => `
        <div class="reply" style="--reply-depth: ${Math.min(depth, 6)}">
          <div class="reply-avatar" ${avatarStyle(reply.avatarColor)} aria-hidden="true">${escapeHtml(reply.initials)}</div>
          <div class="reply-content ${reply.deletedAt ? "deleted" : ""}">
            <div class="reply-meta">
              <strong>${escapeHtml(reply.author)}</strong>
              <span>${escapeHtml(reply.time)}</span>
            </div>
            <p>${escapeHtml(reply.deletedAt ? "Respuesta borrada por su autor." : reply.message)}</p>
            <div class="reply-tools">
              ${!reply.deletedAt ? `
                <button class="icon-button ${activeReplyTarget === targetKey(reply.postId, reply.id) ? "active" : ""}" type="button" data-reply-reply="${escapeHtml(reply.id)}" data-post-id="${escapeHtml(reply.postId)}" aria-label="Responder respuesta">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 17 4 12l5-5"></path>

}

function renderPosts() {
  const items = visiblePosts();
  feed.innerHTML = items.map((post) => `
    <article class="post ${post.deletedAt ? "deleted" : ""}">

        <div class="post-actions">
          <button class="icon-button ${post.liked ? "active" : ""}" type="button" data-like="${escapeHtml(post.id)}" aria-label="Dar me gusta">

              <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"></path>
            </svg>

          </button>
          ${!post.deletedAt ? `
            <button class="icon-button ${activeReplyTarget === targetKey(post.id) ? "active" : ""}" type="button" data-reply-post="${escapeHtml(post.id)}" aria-label="Responder tema" aria-expanded="${activeReplyTarget === targetKey(post.id)}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>

          ` : ""}
          ${isOwnItem(post) && !post.deletedAt ? `
            <button class="icon-button owner-action" type="button" data-delete-post="${escapeHtml(post.id)}" aria-label="Borrar tema">
              Borrar
            </button>
          ` : ""}
        </div>
        ${!post.deletedAt ? renderReplyForm(post.id) : ""}
        ${renderReplies(post.replies)}
      </div>
    </article>

  updateEmptyState(items);
  updateCounts();

function makePostRow(post) {
  const author = currentAuthorInfo();
  return {
    title: post.title,
    message: post.message,
    category: post.category,
    author: author.author,
    initials: author.initials,
    avatar_color: author.avatarColor,
    author_email: author.authorEmail,
    user_id: author.userId,
    likes: post.likes
  };
}

function makeReplyRow(reply, postId, parentReplyId = null) {
  const author = currentAuthorInfo();
  return {
    post_id: postId,
    parent_reply_id: parentReplyId || null,
    message: reply.message,
    author: author.author,
    initials: author.initials,
    avatar_color: author.avatarColor,
    author_email: author.authorEmail,
    user_id: author.userId
  };
}

function buildReplyTree(replyRows, postIds) {
  const repliesByPost = new Map(postIds.map((id) => [id, []]));
  const repliesById = new Map();

  (replyRows || []).forEach((row) => {
    const reply = normalizeReply(row, row.post_id);
    reply.replies = [];
    repliesById.set(reply.id, reply);
  });

  repliesById.forEach((reply) => {
    const parent = reply.parentReplyId ? repliesById.get(reply.parentReplyId) : null;
    if (parent && parent.postId === reply.postId) {
      parent.replies.push(reply);
      return;
    }

    const rootReplies = repliesByPost.get(reply.postId) || [];
    rootReplies.push(reply);
    repliesByPost.set(reply.postId, rootReplies);
  });

  return repliesByPost;
}

async function loadRemotePosts() {
  if (!supabaseClient) return;

  const liked = likedPostIds();
  const { data: postRows, error: postError } = await supabaseClient
    .from("forum_posts")
    .select("id,title,message,category,author,initials,avatar_color,author_email,user_id,likes,created_at,deleted_at")
    .order("created_at", { ascending: false });

  if (postError) throw postError;

  const ids = (postRows || []).map((post) => post.id);
  let repliesByPost = new Map(ids.map((id) => [id, []]));

  if (ids.length > 0) {
    const { data: replyRows, error: replyError } = await supabaseClient
      .from("forum_replies")
      .select("id,post_id,parent_reply_id,message,author,initials,avatar_color,author_email,user_id,created_at,deleted_at")
      .in("post_id", ids)
      .order("created_at", { ascending: true });

    if (replyError) throw replyError;
    repliesByPost = buildReplyTree(replyRows || [], ids);
  }

  posts = (postRows || []).map((post) => normalizePost({
    ...post,
    time: formatDbTime(post.created_at),
    liked: liked.has(post.id),
    replies: repliesByPost.get(post.id) || []
  }));

  renderPosts();
}

function stopRemoteRefresh() {
  if (refreshTimer) window.clearInterval(refreshTimer);
  refreshTimer = null;
}

function startRemoteRefresh() {
  stopRemoteRefresh();
  refreshTimer = window.setInterval(() => {
    const activeElement = document.activeElement;
    if (activeElement && activeElement.closest("#composer, .reply-form, #authModal, #profileForm")) return;
    withTimeout(loadRemotePosts(), 9000, "No se pudieron actualizar los temas.").catch(() => {
      setConnectionStatus("Conexión compartida con problemas.");
    });
  }, 15000);
}

async function loadCurrentProfile() {
  if (!supabaseClient || !currentUser) {
    currentProfile = null;
    return;
  }

  const fallback = {
    username: fallbackUsername(currentUser),
    avatarColor: avatarColorFor(currentUser.id || currentUser.email)
  };

  currentProfile = fallback;

  const { data, error } = await supabaseClient
    .from("forum_profiles")
    .select("username,avatar_color")
    .eq("id", currentUser.id)
    .maybeSingle();

  if (error) {
    writeJson(localProfileKey, fallback);
    showStatus("Cuenta activa. Ejecuta el SQL actualizado si no ves perfiles.");
    return;
  }

  if (data) {
    currentProfile = {
      username: data.username,
      avatarColor: safeAvatarColor(data.avatar_color)
    };
    writeJson(localProfileKey, currentProfile);
    return;
  }

  const pending = readJson(pendingProfileKey, null);
  const username = cleanUsername(pending?.username) || fallback.username;
  await saveProfile(username, fallback.avatarColor, { quiet: true });
  localStorage.removeItem(pendingProfileKey);
}

async function saveProfile(username, avatarColor, options = {}) {
  if (!supabaseClient || !currentUser) return false;

  const cleanName = cleanUsername(username);
  if (cleanName.length < 2) {
    showStatus("El nombre de usuario necesita al menos 2 caracteres.");
    return false;
  }

  const nextProfile = {
    id: currentUser.id,
    username: cleanName,
    avatar_color: safeAvatarColor(avatarColor || avatarColorFor(currentUser.id || cleanName))
  };

  const { error } = await supabaseClient
    .from("forum_profiles")
    .upsert(nextProfile, { onConflict: "id" });

  if (error) {
    showStatus("No se pudo guardar el nombre. Puede estar ocupado.");
    return false;
  }

  currentProfile = {
    username: nextProfile.username,
    avatarColor: nextProfile.avatar_color
  };
  writeJson(localProfileKey, currentProfile);
  if (!options.quiet) showStatus("Nombre de usuario guardado.");
  renderPosts();
  return true;
}

async function syncAuthState() {
  if (!supabaseClient) {
    currentUser = null;
    currentProfile = null;
    renderAuthState();
    return;
  }

  const { data, error } = await withTimeout(
    supabaseClient.auth.getSession(),
    7000,
    "No se pudo revisar la sesión."
  );

  if (error) {
    currentUser = null;
    currentProfile = null;
    renderAuthState();
    return;
  }

  currentUser = data.session?.user || null;
  if (currentUser) {
    await withTimeout(
      loadCurrentProfile(),
      7000,
      "No se pudo cargar el perfil."
    ).catch(() => {
      currentProfile = {
        username: fallbackUsername(currentUser),
        avatarColor: avatarColorFor(currentUser.id || currentUser.email)
      };
    });
  }
  renderAuthState();
}

function subscribeToAuth() {
  if (!supabaseClient) return;
  if (authSubscription) {
    authSubscription.unsubscribe();
    authSubscription = null;
  }

  const { data } = supabaseClient.auth.onAuthStateChange(async (_event, session) => {
    currentUser = session?.user || null;
    if (currentUser) await loadCurrentProfile();
    else currentProfile = null;
    renderAuthState();
    renderPosts();
  });

  authSubscription = data?.subscription || null;
}

async function connectRemote(config, options = {}) {
  if (!window.supabase || typeof window.supabase.createClient !== "function") {
    usingRemote = false;
    setConnectionStatus("Supabase no cargó. Revisa internet.");
    showStatus("No se pudo cargar Supabase.");
    return false;
  }

  if (!config?.url || !config?.key) {
    usingRemote = false;
    setConnectionStatus("Falta guardar la clave pública.");
    renderAuthState();
    return false;
  }

  try {
    setConnectionStatus("Conectando...");
    writeJson(supabaseConfigKey, {
      url: normalizeSupabaseUrl(config.url),
      key: String(config.key || "").trim()
    });
    fillSupabaseInputs();
    supabaseClient = window.supabase.createClient(config.url, config.key, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        storageKey: "foro-aurora-auth"
      }
    });
    usingRemote = true;
    subscribeToAuth();
    setConnectionStatus("Conexión lista. Revisando sesión...");
    await withTimeout(
      syncAuthState(),
      9000,
      "No se pudo revisar la sesión."
    ).catch(() => {
      currentUser = null;
      currentProfile = null;
      renderAuthState();
    });

    setConnectionStatus(currentUser ? "Cuenta conectada. Cargando temas..." : "Base conectada. Inicia sesión.");

    await withTimeout(
      loadRemotePosts(),
      10000,
      "No se pudieron cargar los temas."
    ).catch(() => {
      renderPosts();
      setConnectionStatus(currentUser
        ? "Cuenta conectada. No se pudieron cargar los temas."
        : "Base conectada. No se pudieron cargar los temas.");
      showStatus("Si sigue pasando, ejecuta el SQL actualizado en Supabase.");
    });

    startRemoteRefresh();
    if (connectionStatus.textContent.includes("Cargando") || connectionStatus.textContent.includes("Inicia sesión")) {
      setConnectionStatus(currentUser ? "Base compartida activa. Cuenta conectada." : "Base compartida activa. Inicia sesión.");
    }
    if (options.showStatus) showStatus("Conectado a base compartida.");
    return true;
  } catch (error) {
    usingRemote = Boolean(supabaseClient);
    posts = loadLocalPosts();
    renderPosts();
    if (usingRemote) {
      setConnectionStatus("Base conectada, pero hay un problema cargando datos.");
      showStatus("Puedes intentar entrar. Si falla, revisa la clave y el SQL.");
      return true;
    }

    setConnectionStatus("No se pudo conectar con Supabase.");
    showStatus("Revisa URL, clave pública e internet.");
    return false;
  }
}

async function bootRemoteIfConfigured() {
  const config = getSupabaseConfig();
  if (!config.url || !config.key) {
    setConnectionStatus("URL de Supabase lista. Falta guardar la clave pública una vez.");
    renderAuthState();
    return;
  }

  setConnectionStatus("Supabase recordado. Conectando...");
  await connectRemote(config);
}

async function ensureSupabaseReady() {
  if (supabaseClient && usingRemote) return true;
  const config = getSupabaseConfig();
  if (!config.key) {
    showStatus("Primero guarda la clave pública de Supabase una vez.");
    return false;
  }
  return connectRemote(config, { showStatus: false });
}

function switchToLocalMode() {
  localStorage.removeItem(supabaseConfigKey);
  usingRemote = false;
  supabaseClient = null;
  currentUser = null;
  currentProfile = null;
  if (authSubscription) {
    authSubscription.unsubscribe();
    authSubscription = null;
  }
  stopRemoteRefresh();
  posts = loadLocalPosts();
  activeReplyTarget = null;
  fillSupabaseInputs();
  renderPosts();
  setConnectionStatus("Modo local.");
  showStatus("Volviste al modo local.");
}

function requireSignedIn() {
  if (!usingRemote || !supabaseClient) {
    showStatus("Conecta Supabase para publicar con cuenta.");
    return false;
  }

  if (!currentUser) {
    openAuthModal("signin");
    showStatus("Inicia sesión para publicar o responder.");
    return false;
  }

  return true;
}

async function createPost(post) {
  if (!requireSignedIn()) return;

  const { error } = await supabaseClient.from("forum_posts").insert(makePostRow(post));
  if (error) throw error;
  await loadRemotePosts();
  showStatus("Tema publicado con tu usuario.");
}

async function createReply(postId, parentReplyId, reply) {
  if (!requireSignedIn()) return;

  const { error } = await supabaseClient
    .from("forum_replies")
    .insert(makeReplyRow(reply, postId, parentReplyId));

  if (error) throw error;
  await loadRemotePosts();
  showStatus("Respuesta publicada con tu usuario.");
}

async function deletePost(postId) {
  const post = posts.find((item) => item.id === postId);
  if (!post || !isOwnItem(post)) return;

  const shouldDelete = window.confirm("Seguro que quieres borrar tu tema?");
  if (!shouldDelete) return;

  if (usingRemote && supabaseClient) {
    const { error } = await supabaseClient
      .from("forum_posts")
      .update({
        title: "Tema borrado",
        message: "Este tema fue borrado por su autor.",
        deleted_at: new Date().toISOString()
      })
      .eq("id", postId)
      .eq("user_id", currentUser.id);
    if (error) throw error;
    await loadRemotePosts();
    showStatus("Tu tema fue borrado.");
    return;
  }

  post.title = "Tema borrado";
  post.message = "Este tema fue borrado por su autor.";
  post.deletedAt = new Date().toISOString();
  saveLocalPosts();
  renderPosts();
}

function removeLocalReply(replies, replyId) {
  const index = replies.findIndex((reply) => reply.id === replyId);
  if (index >= 0) {
    replies.splice(index, 1);
    return true;
  }

  return replies.some((reply) => removeLocalReply(reply.replies || [], replyId));
}

async function deleteReply(replyId) {
  const reply = posts.flatMap((post) => flattenReplies(post.replies)).find((item) => item.id === replyId);
  if (!reply || !isOwnItem(reply)) return;

  const shouldDelete = window.confirm("Seguro que quieres borrar tu respuesta?");
  if (!shouldDelete) return;

  if (usingRemote && supabaseClient) {
    const { error } = await supabaseClient
      .from("forum_replies")
      .update({
        message: "Respuesta borrada por su autor.",
        deleted_at: new Date().toISOString()
      })
      .eq("id", replyId)
      .eq("user_id", currentUser.id);
    if (error) throw error;
    await loadRemotePosts();
    showStatus("Tu respuesta fue borrada.");
    return;
  }

  reply.message = "Respuesta borrada por su autor.";
  reply.deletedAt = new Date().toISOString();
  saveLocalPosts();
  renderPosts();
}

async function toggleLike(postId) {
  const post = posts.find((item) => item.id === postId);
  if (!post) return;

  const liked = likedPostIds();
  const nextLiked = !post.liked;
  const delta = nextLiked ? 1 : -1;

  post.liked = nextLiked;
  post.likes = Math.max(0, post.likes + delta);
  if (nextLiked) liked.add(postId);
  else liked.delete(postId);
  saveLikedPostIds(liked);
  renderPosts();

  if (usingRemote && supabaseClient) {
    const { error } = await supabaseClient.rpc("forum_change_like", {
      target_post_id: postId,
      like_delta: delta
    });

    if (error) {
      post.liked = !nextLiked;
      post.likes = Math.max(0, post.likes - delta);
      if (nextLiked) liked.delete(postId);
      else liked.add(postId);
      saveLikedPostIds(liked);
      renderPosts();
      showStatus("No se pudo guardar el like. Revisa el SQL de Supabase.");
      return;
    }

    await loadRemotePosts();
    return;
  }

  saveLocalPosts();
}

function exportData() {
  const payload = {
    app: "Foro Aurora",
    version: 3,
    mode: usingRemote ? "supabase" : "local",
    exportedAt: new Date().toISOString(),
    posts
  };
  const file = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(file);
  const link = document.createElement("a");

  link.href = url;
  link.download = exportFileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  showStatus("Datos exportados.");
}

function mergeLocalPosts(importedPosts) {
  const existingIds = new Set(posts.map((post) => post.id));
  const normalizedPosts = importedPosts.map(normalizePost);
  let added = 0;

  normalizedPosts.forEach((post) => {
    if (!existingIds.has(post.id)) {
      posts.push(post);
      existingIds.add(post.id);
      added += 1;
    }
  });

  saveLocalPosts();
  renderPosts();
  showStatus(`${added} ${added === 1 ? "tema importado" : "temas importados"}.`);
}

async function importReplyTree(replies, postId, parentReplyId = null) {
  for (const reply of replies) {
    const { data, error } = await supabaseClient
      .from("forum_replies")
      .insert(makeReplyRow(reply, postId, parentReplyId))
      .select("id")
      .single();

    if (error) throw error;
    await importReplyTree(reply.replies || [], postId, data.id);
  }
}

async function importRemotePosts(importedPosts) {
  if (!requireSignedIn()) return;
  const normalizedPosts = importedPosts.map(normalizePost);
  let added = 0;

  for (const post of normalizedPosts) {
    const { data, error } = await supabaseClient
      .from("forum_posts")
      .insert(makePostRow(post))
      .select("id")
      .single();

    if (error) throw error;
    await importReplyTree(post.replies || [], data.id);
    added += 1;
  }

  await loadRemotePosts();
  showStatus(`${added} ${added === 1 ? "tema importado" : "temas importados"} a la base compartida.`);
}

function importData(file) {
  if (!file) return;

  const reader = new FileReader();
  reader.addEventListener("load", async () => {
    try {
      const data = JSON.parse(String(reader.result || "{}"));
      const importedPosts = Array.isArray(data) ? data : data.posts;

      if (!Array.isArray(importedPosts)) {
        showStatus("Archivo no compatible.");
        return;
      }

      if (usingRemote && supabaseClient) {
        await importRemotePosts(importedPosts);
      } else {
        mergeLocalPosts(importedPosts);
      }
    } catch (error) {
      showStatus("No se pudo importar el archivo.");
    }
  });
  reader.readAsText(file);
}

function openAuthModal(mode = "signin") {
  if (!authModal) return;
  authModal.hidden = false;
  authTitle.textContent = mode === "signup" ? "Crear cuenta" : "Entrar al foro";
  authHint.textContent = "";
  window.setTimeout(() => {
    if (mode === "signup") authUsernameInput.focus();
    else authEmailInput.focus();
  }, 0);
}

function closeAuthModal() {
  if (authModal) authModal.hidden = true;
}

async function handleSignIn() {
  const ready = await ensureSupabaseReady();
  if (!ready) return;

  const email = authEmailInput.value.trim();
  const password = authPasswordInput.value;
  if (!email || !password) {
    showStatus("Escribe correo y contraseña.");
    return;
  }

  let result = null;
  authSignInButton.disabled = true;
  authSignInButton.textContent = "Entrando...";

  try {
    result = await withTimeout(
      supabaseClient.auth.signInWithPassword({ email, password }),
      12000,
      "La entrada tardó demasiado."
    );
  } catch (error) {
    showStatus(authErrorMessage(error));
    return;
  } finally {
    authSignInButton.disabled = false;
    authSignInButton.textContent = "Entrar";
  }

  if (result?.error) {
    showStatus(authErrorMessage(result.error));
    return;
  }

  await withTimeout(syncAuthState(), 8000, "No se pudo actualizar la sesión.").catch(() => {});
  await withTimeout(loadRemotePosts(), 9000, "No se pudieron cargar los temas.").catch(() => {});
  closeAuthModal();
  showStatus("Sesión iniciada.");
}

async function handleSignUp() {
  const ready = await ensureSupabaseReady();
  if (!ready) return;

  const username = cleanUsername(authUsernameInput.value);
  const email = authEmailInput.value.trim();
  const password = authPasswordInput.value;

  if (username.length < 2) {
    showStatus("Elige un nombre de usuario.");
    return;
  }

  if (!email || password.length < 6) {
    showStatus("Escribe correo y una contraseña de 6 caracteres o más.");
    return;
  }

  authSignUpButton.disabled = true;
  authSignUpButton.textContent = "Creando...";
  writeJson(pendingProfileKey, { username });

  let result = null;
  try {
    result = await withTimeout(
      supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            username,
            display_name: username
          }
        }
      }),
      12000,
      "La creación de cuenta tardó demasiado."
    );
  } catch (error) {
    showStatus(authErrorMessage(error));
    return;
  } finally {
    authSignUpButton.disabled = false;
    authSignUpButton.textContent = "Crear cuenta";
  }

  const { data, error } = result || {};

  if (error) {
    const message = String(error.message || "").toLowerCase();
    if (message.includes("already") || message.includes("registered") || message.includes("exists")) {
      showStatus("Esa cuenta ya existe. Usa el botón Entrar.");
    } else {
      showStatus("No se pudo crear la cuenta. Prueba otro correo o nombre.");
    }
    return;
  }

  if (!data?.session) {
    showStatus("Cuenta creada. Revisa tu correo para confirmar y luego usa Entrar.");
    return;
  }

  currentUser = data.session.user;
  await withTimeout(
    saveProfile(username, avatarColorFor(currentUser.id || username), { quiet: true }),
    8000,
    "No se pudo guardar el perfil."
  ).catch(() => {});
  await withTimeout(syncAuthState(), 8000, "No se pudo actualizar la sesión.").catch(() => {});
  closeAuthModal();
  showStatus("Cuenta creada y conectada.");
}

function renderAuthState() {
  const canPost = Boolean(usingRemote && supabaseClient && currentUser);
  composer.classList.toggle("is-locked", !canPost);
  if (composerNotice) {
    composerNotice.classList.toggle("visible", !canPost);
    const noticeText = composerNotice.querySelector("span");
    if (noticeText) {
      noticeText.textContent = usingRemote
        ? "Inicia sesión para publicar con tu nombre."
        : "Conecta Supabase para usar cuentas y publicar.";
    }
  }

  [titleInput, categoryInput, messageInput].forEach((item) => {
    item.disabled = !canPost;
  });

  const submitButton = composer.querySelector("button[type='submit']");
  if (submitButton) submitButton.disabled = !canPost;

  if (!accountSummary) return;

  if (currentUser) {
    const info = currentAuthorInfo();
    accountSummary.innerHTML = `
      <div class="account-user">
        <div class="account-avatar" ${avatarStyle(info.avatarColor)} aria-hidden="true">${escapeHtml(info.initials)}</div>
        <div>
          <div class="account-name">${escapeHtml(info.author)}</div>
          <div class="account-email">${escapeHtml(info.authorEmail)}</div>
        </div>
      </div>
    `;
    accountOpenButton.hidden = true;
    logoutButton.hidden = false;
    profileForm.hidden = false;
    profileNameInput.value = info.author;
    return;
  }

  accountSummary.innerHTML = `
    <p class="status-message">Sin sesión. Los temas y respuestas pedirán cuenta.</p>
  `;
  accountOpenButton.hidden = false;
  logoutButton.hidden = true;
  profileForm.hidden = true;
}

function bindEvents() {
  categoryButtons.forEach((button) => {
    button.addEventListener("click", () => {
      activeCategory = button.dataset.category;
      categoryButtons.forEach((item) => item.classList.toggle("active", item === button));
      renderPosts();
    });
  });

  searchInput.addEventListener("input", renderPosts);
  sortSelect.addEventListener("change", renderPosts);

  messageInput.addEventListener("input", () => {
    charCount.textContent = `${messageInput.value.length} / 420`;
  });

  composer.addEventListener("submit", async (event) => {
    event.preventDefault();
    const title = titleInput.value.trim();
    const message = messageInput.value.trim();
    if (!title || !message) return;

    const post = {
      id: createId(),
      title,
      message,
      category: categoryInput.value,
      replies: [],
      likes: 0,
      time: formatTime(),
      liked: false
    };

    try {
      await createPost(post);
      composer.reset();
      charCount.textContent = "0 / 420";
    } catch (error) {
      showStatus("No se pudo publicar el tema. Revisa que ejecutaste el SQL nuevo.");
    }
  });

  feed.addEventListener("click", async (event) => {
    const likeButton = event.target.closest("[data-like]");
    const replyPostButton = event.target.closest("[data-reply-post]");
    const replyReplyButton = event.target.closest("[data-reply-reply]");
    const cancelReplyButton = event.target.closest("[data-cancel-reply]");
    const deletePostButton = event.target.closest("[data-delete-post]");
    const deleteReplyButton = event.target.closest("[data-delete-reply]");
    const loginButton = event.target.closest("[data-login-open]");

    try {
      if (likeButton) await toggleLike(likeButton.dataset.like);

      if (replyPostButton) {
        activeReplyTarget = activeReplyTarget === targetKey(replyPostButton.dataset.replyPost)
          ? null
          : targetKey(replyPostButton.dataset.replyPost);
        renderPosts();
      }

      if (replyReplyButton) {
        activeReplyTarget = activeReplyTarget === targetKey(replyReplyButton.dataset.postId, replyReplyButton.dataset.replyReply)
          ? null
          : targetKey(replyReplyButton.dataset.postId, replyReplyButton.dataset.replyReply);
        renderPosts();
      }

      if (cancelReplyButton) {
        activeReplyTarget = null;
        renderPosts();
      }

      if (deletePostButton) await deletePost(deletePostButton.dataset.deletePost);
      if (deleteReplyButton) await deleteReply(deleteReplyButton.dataset.deleteReply);
      if (loginButton) openAuthModal("signin");

      const replyText = document.querySelector(`[data-reply-text="${cssEscape(activeReplyTarget || "")}"]`);
      if (replyText) replyText.focus();
    } catch (error) {
      showStatus("No se pudo completar la accion.");
    }
  });

  feed.addEventListener("submit", async (event) => {
    const replyForm = event.target.closest("[data-reply-form]");
    if (!replyForm) return;

    event.preventDefault();
    const replyMessageInput = replyForm.elements.replyMessage;
    const message = replyMessageInput.value.trim();
    if (!message) return;

    const reply = {
      id: createId(),
      message,
      time: formatTime()
    };

    try {
      await createReply(replyForm.dataset.postId, replyForm.dataset.parentReplyId || null, reply);
      activeReplyTarget = null;
      renderPosts();
    } catch (error) {
      showStatus("No se pudo publicar la respuesta. Revisa que ejecutaste el SQL nuevo.");
    }
  });

  document.addEventListener("click", (event) => {
    const loginButton = event.target.closest("[data-login-open]");
    if (loginButton) openAuthModal("signin");
  });

  themeToggle.addEventListener("click", () => {
    setTheme(!document.body.classList.contains("dark"));
  });

  exportButton.addEventListener("click", exportData);

  importButton.addEventListener("click", () => {
    importFile.click();
  });

  importFile.addEventListener("change", () => {
    importData(importFile.files[0]);
    importFile.value = "";
  });

  clearButton.addEventListener("click", () => {
    if (usingRemote) {
      showStatus("Por seguridad, no se vacia la base compartida desde la pagina.");
      return;
    }

    const shouldClear = window.confirm("Seguro que quieres vaciar el foro en este navegador?");
    if (!shouldClear) return;

    posts.length = 0;
    activeReplyTarget = null;
    saveLocalPosts();
    renderPosts();
    showStatus("Foro local vaciado.");
  });

  connectButton.addEventListener("click", async () => {
    const config = saveSupabaseConfig();
    if (!config) return;
    await connectRemote(config, { showStatus: true });
  });

  localModeButton.addEventListener("click", switchToLocalMode);

  accountOpenButton?.addEventListener("click", () => openAuthModal("signin"));
  authCloseButton?.addEventListener("click", closeAuthModal);
  authModal?.addEventListener("click", (event) => {
    if (event.target === authModal) closeAuthModal();
  });
  authSignInButton?.addEventListener("click", handleSignIn);
  authForm?.addEventListener("submit", (event) => {
    event.preventDefault();
    handleSignUp();
  });

  logoutButton?.addEventListener("click", async () => {
    if (!supabaseClient) return;
    await supabaseClient.auth.signOut();
    currentUser = null;
    currentProfile = null;
    renderPosts();
    showStatus("Sesión cerrada.");
  });

  profileForm?.addEventListener("submit", async (event) => {
    event.preventDefault();
    await saveProfile(profileNameInput.value, currentAuthorInfo().avatarColor);
  });
}

function boot() {
  fillSupabaseInputs();
  setTheme(localStorage.getItem("forum-theme") === "dark");
  posts = loadLocalPosts();
  renderPosts();
  bindEvents();
  bootRemoteIfConfigured();
}

boot();

  </script>
